<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Not Found</title>

  <!-- 既存CSSをそのまま使う -->
  <link rel="stylesheet" href="/2025/style.css">

  <style>
    .error-wrapper {
      width: 100%;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
    }

    .error-inner {
      width: 520px;
      max-width: 90%;
      background: #fff;
      padding: 48px 24px;
      text-align: center;
      box-shadow: 0px 0px 16px -2px rgba(0,0,0,0.15);
    }

    .error-code {
      font-size: 72px;
      font-weight: bold;
      font-family: var(--font-family-heading);
      color: var(--color-text);
      margin-bottom: 16px;
    }

    .error-title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .error-text {
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 32px;
      color: var(--color-text);
    }

    .home-link {
      display: inline-block;
      padding: 12px 20px;
      border: 1px solid #333;
      transition: all 0.3s ease;
    }

    .home-link:hover {
      background: #333;
      color: #fff;
    }
  </style>
</head>

<body>
  <div class="error-wrapper">
    <div class="error-inner">

      <h1 class="error-code">404</h1>

      <h2 class="error-title">ページが見つかりません</h2>

      <p class="error-text">
        URLが間違っているか、<br>
        ページが移動・削除された可能性があります。
      </p>

      <a href="/" class="home-link a-underline">
        トップページへ戻る
      </a>

    </div>
  </div>
</body>
</html>
