<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - ページが見つかりません</title>
  <style>
    body {
      font-family: sans-serif;
      display: grid;
      place-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f7f7f7;
      color: #222;
      text-align: center;
      padding: 24px;
    }
    .box {
      max-width: 520px;
      background: white;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    a {
      display: inline-block;
      margin-top: 16px;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>404</h1>
    <p>ページが見つかりませんでした。</p>
    <p>URLが間違っているか、ページが移動した可能性があります。</p>
    <a href="/2025">トップページへ戻る</a>
  </div>
</body>
</html>
