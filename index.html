<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>工事中です</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      background: #f7f7f7;
      color: #222;
    }

    .card {
      text-align: center;
      padding: 40px 24px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      max-width: 520px;
      width: 90%;
    }

    .icon {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 2rem;
    }

    p {
      margin: 0 0 12px;
      line-height: 1.7;
      font-size: 0.95rem;
    }

    .small {
      font-size: 0.8rem;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🚧</div>
    <h1>工事中です</h1>
    <p>
      このページは現在準備中です。<br>
      もうしばらくお待ちください。
    </p>
    <p class="small">ちゃんと作ってます（たぶん）。</p>
  </div>
</body>
</html>
