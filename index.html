<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>まるごと祭 ARCHIVE</title>
  <meta name="description" content="まるごと祭の開催アーカイブ一覧" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="#" class="logo">まるごと祭 ARCHIVE</a>
      <nav class="nav">
        <a href="#archive">ARCHIVE</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="hero-bg"></div>
      <div class="hero-overlay"></div>

      <div class="hero-inner">
        <p class="hero-kicker">神山まるごと高専の文化祭</p>
        <h1 class="hero-title">
          まるごと祭<br />
          ARCHIVE
        </h1>
        <a href="#archive" class="hero-button">VIEW ARCHIVE</a>
      </div>
    </section>

    <section class="intro" id="archive">
      <div class="section-inner">
        <p class="section-label">PAST EVENTS</p>
        <h2 class="section-title">開催アーカイブ</h2>
      </div>
    </section>

    <section class="archive">
      <div class="section-inner archive-list">

        <a class="archive-card" href="https://2025.marugotosai.jp" target="_blank" rel="noopener noreferrer">
          <div class="archive-image-wrap">
            <img src="images/2025.jpg" alt="まるごと祭2025 メインビジュアル" class="archive-image" />
          </div>
          <div class="archive-content">
            <div class="archive-year-row">
              <span class="archive-year">2025</span>
              <span class="archive-arrow">↗</span>
            </div>
            <p class="archive-date">2025.10.25 — 2025.10.26</p>
          </div>
        </a>

        <a class="archive-card" href="https://2024.marugotosai.jp" target="_blank" rel="noopener noreferrer">
          <div class="archive-image-wrap">
            <img src="images/2024.jpg" alt="まるごと祭2024 メインビジュアル" class="archive-image" />
          </div>
          <div class="archive-content">
            <div class="archive-year-row">
              <span class="archive-year">2024</span>
              <span class="archive-arrow">↗</span>
            </div>
            <p class="archive-date">2024.10.26 — 2024.10.27</p>
          </div>
        </a>

      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="section-inner footer-inner">
        <p>まるごと祭 ARCHIVE</p>

        <p class="footer-links">
        <a href="https://x.com/marugotosai" target="_blank">X</a>
        <a href="https://www.instagram.com/marugotosai/?hl=ja" target="_blank">Instagram</a>
        <a href="https://www.youtube.com/@marugotosai" target="_blank">YouTube</a>
        <a href="https://note.com/marugotosai" target="_blank">note</a>
        <a href="http://kamiyama.ac.jp/" target="_blank">神山まるごと高専</a>
        </p>
    </div>
  </footer>
</body>
</html>
